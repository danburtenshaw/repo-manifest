pre-commit:
  parallel: true
  commands:
    check:
      glob: "*.{ts,js,mts,cts,mjs,cjs,json,jsonc,md,yml,yaml}"
      run: ./node_modules/.bin/vp check --fix {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: ./node_modules/.bin/commitlint --edit {1}

pre-push:
  commands:
    check:
      run: ./node_modules/.bin/vp check
    schema:
      run: node scripts/emit-schema.ts && git diff --exit-code -- schema
      fail_text: "Schema drift: run 'pnpm run emit-schema' and commit."
    test:
      run: ./node_modules/.bin/vp test
    build:
      run: ./node_modules/.bin/vp pack src/index.ts -f esm --target node24 --platform node --out-dir dist
