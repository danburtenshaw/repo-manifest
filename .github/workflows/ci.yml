name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            registry.npmjs.org:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format + lint + typecheck
        run: pnpm exec vp check

      - name: Emit JSON Schema
        run: pnpm run emit-schema

      - name: Verify schema is up to date
        run: |
          if ! git diff --exit-code -- schema; then
            echo "::error title=schema out of sync::Run 'pnpm run emit-schema' and commit the result."
            exit 1
          fi

      - name: Test
        run: pnpm exec vp test

      - name: Build bundle
        run: pnpm run build

      - name: Verify bundle parses
        run: node --check dist/index.mjs

      - name: Verify dist is up to date
        run: |
          if ! git diff --exit-code -- dist; then
            echo "::error title=dist out of sync::Run 'pnpm run build' and commit the result."
            exit 1
          fi
