version: 1

# Full reconciliation: declare a specific label set and assert that
# labels with the same name but a different colour/description get
# updated, not left alone. Baseline applies `labels.items: []` before
# this scenario, so the starting state has zero labels.

labels:
  items:
    - name: bug
      color: d73a4a
      description: "Something isn't working"
    - name: enhancement
      color: a2eeef
      description: "New feature or request"
    - name: e2e-only
      color: ededed
      description: "Created by the e2e test suite"
