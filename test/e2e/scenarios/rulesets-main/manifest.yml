version: 1

# Single branch ruleset protecting the default branch. Covers the
# highest-surface-area rule types: pull_request, required_status_checks,
# non_fast_forward, deletion, required_linear_history — plus a bypass
# actor, which rounds through a different API field than the rules
# themselves.
#
# Note: `evaluate` enforcement would be belt-and-braces against any
# accidental write to the protected ref, but it requires an Enterprise
# plan (the sandbox is on the free tier). The scenario doesn't push to
# the ref, so `active` is safe here.

rulesets:
  - name: e2e-main-protection
    target: branch
    enforcement: active
    conditions:
      ref_name:
        include: ["~DEFAULT_BRANCH"]
        exclude: []
    rules:
      pull_request:
        required_approving_review_count: 1
        dismiss_stale_reviews_on_push: true
        require_code_owner_review: false
        require_last_push_approval: false
      required_status_checks:
        strict_required_status_checks_policy: true
        required_checks:
          - context: e2e / smoke
      non_fast_forward: true
      deletion: true
      required_linear_history: true
    bypass_actors:
      - actor_type: RepositoryRole
        actor_id: 5
        bypass_mode: always
